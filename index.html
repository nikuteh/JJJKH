<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordify Hackathon Test</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #121212; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        #player-container { 
            margin-top: 20px; 
            min-height: 152px; 
            background: #282828; 
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button { 
            background: #1DB954; color: white; border: none; 
            padding: 10px 20px; border-radius: 20px; cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #1ed760; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Spotify Embed Test</h1>
        <p>Click the button to load the song from your dataset example.</p>
        
        <button id="load-song">Play Test Song</button>

        <div id="player-container">
            <p>Player will appear here...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
